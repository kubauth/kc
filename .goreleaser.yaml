
version: 2

before:
  hooks:
    - go mod tidy

builds:

  - id: kc
    main: main.go
    binary: kc
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

release:
  prerelease: "true"

archives:
  - id: kc
    formats:
      - binary
    builds:
      - kc
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      kc_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

checksum:
  name_template: 'checksums.txt'

changelog:
  disable: true

